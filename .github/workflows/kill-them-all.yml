name: Kill All Running Workflows

on:
  workflow_dispatch:

permissions:
  actions: write          # مجوز لغو اجراها

jobs:
  terminate:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت کدها (برای دسترسی به ریپوی Git)
        uses: actions/checkout@v4

      - name: متوقف کردن تمام workflowهای در حال اجرا
        env:
          # اولویت با توکنی که خودت درست کردی. اگه نباشه، GITHUB_TOKEN پیش‌فرض استفاده می‌شه.
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 در حال دریافت لیست workflowهای در حال اجرا..."

          # گرفتن ID تمام اجراهایی که هنوز تموم نشدن
          RUNNING_IDS=$(gh run list --status in_progress --status queued --status waiting --json databaseId -q '.[].databaseId')

          if [ -z "$RUNNING_IDS" ]; then
            echo "✅ هیچ workflow فعالی برای متوقف کردن وجود نداره. خداحافظ!"
            exit 0
          fi

          echo "⚠️ workflowهای زیر در حال اجرا هستن و متوقف خواهند شد:"
          for rid in $RUNNING_IDS; do
            echo "  • اجرای شماره: $rid"
          done

          echo ""
          echo "⏹️ شروع عملیات توقف..."
          for rid in $RUNNING_IDS; do
            echo "  🛑 در حال توقف اجرای $rid ..."
            # اگه اجرا از قبل تموم شده باشه، خطاش رو نادیده می‌گیریم
            gh run cancel "$rid" 2>/dev/null || echo "  ⚠️ اجرای $rid از قبل تموم شده بود."
          done

          echo ""
          echo "✅ عملیات پاکسازی کامل شد. همه چی خاموشه."
