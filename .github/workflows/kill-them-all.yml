name: Kill All Workflows (All Repos)

on:
  workflow_dispatch:

jobs:
  terminate:
    runs-on: ubuntu-latest
    steps:
      - name: متوقف کردن تمام workflowهای فعال در همه مخازن
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "🔍 دریافت لیست تمام مخازن..."

          # صفحه‌بندی: حداکثر ۵۰ مخزن در هر صفحه (تا ۱۰۰۰ مخزن)
          PAGE=1
          ALL_REPOS=""
          while : ; do
            REPOS=$(curl -s -H "Authorization: token $GH_TOKEN" \
                       "https://api.github.com/user/repos?per_page=100&page=$PAGE" | \
                       jq -r '.[].full_name')
            if [ -z "$REPOS" ]; then
              break
            fi
            ALL_REPOS="$ALL_REPOS $REPOS"
            PAGE=$((PAGE + 1))
          done

          TOTAL=0
          for REPO in $ALL_REPOS; do
            echo ""
            echo "📁 بررسی مخزن: $REPO"
            
            RUN_IDS=$(curl -s -H "Authorization: token $GH_TOKEN" \
                       "https://api.github.com/repos/$REPO/actions/runs?status=in_progress" | \
                       jq -r '.workflow_runs[].id')
            RUN_COUNT=$(echo "$RUN_IDS" | wc -w)
            
            if [ -z "$RUN_IDS" ]; then
              echo "  ✅ هیچ اجرای فعالی در این مخزن نیست."
              continue
            fi
            
            echo "  ⚠️ تعداد اجراهای فعال: $RUN_COUNT"
            for rid in $RUN_IDS; do
              echo "  🛑 توقف اجرای $rid در $REPO ..."
              curl -s -X POST -H "Authorization: token $GH_TOKEN" \
                   "https://api.github.com/repos/$REPO/actions/runs/$rid/cancel" > /dev/null
              TOTAL=$((TOTAL + 1))
            done
          done

          echo ""
          echo "✅ عملیات کامل شد. تعداد کل اجراهای متوقف‌شده: $TOTAL"
